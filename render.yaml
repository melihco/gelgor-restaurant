# Render Blueprint — Postgres + 3 servis (tek repo, GitHub bağlantısı ile otomatik)
# Dashboard: New → Blueprint → bu repo → render.yaml
# Docs: docs/deploy-render.md

databases:
  - name: nexus-db
    plan: free
    databaseName: nexus_db
    user: nexus

envVarGroups:
  - name: smartagency-shared
    envVars:
      - key: INTERNAL_API_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_USE_DEMO_CONTEXT
        value: false
      - key: OrchestrationService__UseDevMock
        value: false
      - key: ENABLE_PUBLIC_API
        value: false

services:
  # Python Crew — private (yalnızca Render internal network)
  - type: pserv
    name: smartagency-crew
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - fromGroup: smartagency-shared
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: APP_DEBUG
        value: false
      - key: NEXUS_API_URL
        fromService:
          name: smartagency-api
          type: web
          property: hostport
      - key: NEXTJS_INTERNAL_URL
        fromService:
          name: smartagency-web
          type: web
          property: hostport

  - type: web
    name: smartagency-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health/live
    envVars:
      - fromGroup: smartagency-shared
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: OrchestrationService__BaseUrl
        fromService:
          name: smartagency-crew
          type: pserv
          property: hostport
      - key: FRONTEND_BASE_URL
        fromService:
          name: smartagency-web
          type: web
          property: hostport
      - key: Cors__AllowedOrigins__0
        fromService:
          name: smartagency-web
          type: web
          property: hostport

  - type: web
    name: smartagency-web
    runtime: docker
    rootDir: apps/web
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /
    envVars:
      - fromGroup: smartagency-shared
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: smartagency-api
          type: web
          property: hostport
      - key: NEXT_PUBLIC_SIGNALR_URL
        fromService:
          name: smartagency-api
          type: web
          property: hostport
      - key: BACKEND_ORIGIN
        fromService:
          name: smartagency-api
          type: web
          property: hostport
      - key: NEXTJS_INTERNAL_URL
        fromService:
          name: smartagency-web
          type: web
          property: hostport
      - key: CREW_BACKEND_URL
        fromService:
          name: smartagency-crew
          type: pserv
          property: hostport
      - key: INTERNAL_API_KEY
        fromGroup: smartagency-shared
