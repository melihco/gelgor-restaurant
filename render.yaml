# Render Blueprint — Postgres + 3 servis (tek repo, GitHub bağlantısı ile otomatik)
# Dashboard: New → Blueprint → bu repo → render.yaml
# Docs: docs/deploy-render.md

databases:
  - name: nexus-db
    plan: free
    databaseName: nexus_db
    user: nexus

envVarGroups:
  - name: smartagency-shared
    envVars:
      - key: INTERNAL_API_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: APIFY_API_KEY
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: APP_ENV
        value: production
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_USE_DEMO_CONTEXT
        value: false
      - key: OrchestrationService__UseDevMock
        value: false
      - key: ENABLE_PUBLIC_API
        value: false

services:
  # Python Crew — private (yalnızca Render internal network)
  - type: pserv
    name: smartagency-crew
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - fromGroup: smartagency-shared
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: APP_DEBUG
        value: false
      - key: NEXUS_API_URL
        fromService:
          name: smartagency-api
          type: web
          property: hostport
      - key: NEXTJS_INTERNAL_URL
        fromService:
          name: smartagency-web
          type: web
          property: hostport
      - key: META_USD_TRY_RATE
        value: "32.0"

  - type: web
    name: smartagency-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health/live
    envVars:
      - fromGroup: smartagency-shared
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: OrchestrationService__BaseUrl
        fromService:
          name: smartagency-crew
          type: pserv
          property: hostport
      - key: FRONTEND_BASE_URL
        fromService:
          name: smartagency-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: Cors__AllowedOrigins__0
        fromService:
          name: smartagency-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: smartagency-web
    runtime: docker
    rootDir: apps/web
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /
    envVars:
      - fromGroup: smartagency-shared
      - key: FAL_API_KEY
        sync: false
      - key: RUNWAY_API_SECRET
        sync: false
      - key: SMART_AGENCY_IMAGE_PROVIDER
        value: flux
      # Instagram / Meta OAuth + Graph publish (desktop ApprovalFeedback)
      - key: NEXT_PUBLIC_SITE_URL
        fromService:
          name: smartagency-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXUS_API_URL
        fromService:
          name: smartagency-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: MERTCAFE_BASE_URL
        sync: false
      - key: MERTCAFE_WORKSPACE_API_KEYS
        sync: false
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: VENUE_PHOTO_PRESERVE
        value: "true"
      - key: AUTO_PRODUCE_GALLERY_ONLY
        value: "true"
      - key: AUTO_PRODUCE_BYPASS_LIMITS
        value: "false"
      - key: AUTO_PRODUCE_RUNWAY
        value: "true"
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: smartagency-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_SIGNALR_URL
        fromService:
          name: smartagency-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: BACKEND_ORIGIN
        fromService:
          name: smartagency-api
          type: web
          property: hostport
      - key: NEXTJS_INTERNAL_URL
        fromService:
          name: smartagency-web
          type: web
          property: hostport
      - key: CREW_BACKEND_URL
        fromService:
          name: smartagency-crew
          type: pserv
          property: hostport
