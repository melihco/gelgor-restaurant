[pytest]
testpaths = tests
pythonpath = .
asyncio_mode = auto
addopts =
    -q
    --cov=app.api.v1.scheduled_templates
    --cov=app.services.output_summary_parser
    --cov=app.services.ai_cost_service
    --cov=app.services.production_throughput
    --cov=app.services.scheduled_template_service
    --cov=app.services.content_strategy_brief
    --cov=app.services.mission_ideation_merge
    --cov=app.crew.mission_memory
    --cov-report=term-missing
    --cov-fail-under=50
